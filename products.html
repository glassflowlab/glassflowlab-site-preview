<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商品列表｜玻璃小店</title>
  <style>
    :root{--bg:#f7f5f2;--card:#fff;--text:#222;--muted:#666;--line:#e7e0d7;--brand:#6f5b4b;--linegreen:#06c755}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
    .wrap{max-width:1080px;margin:0 auto;padding:20px}.brand{display:flex;align-items:center;gap:10px;color:#3f332b;font-weight:800;margin-bottom:18px}
    .brand img{width:34px;height:34px;border-radius:8px}.hero,.card{background:#fff;border:1px solid var(--line);border-radius:18px}.hero{padding:24px;margin-bottom:22px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}.card{overflow:hidden}.thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#fff;border-bottom:1px solid var(--line)}
    .panel{padding:18px}.price{font-size:24px;font-weight:800;color:var(--brand)}.muted{color:#6b5849}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:800;background:var(--linegreen);color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><img src="assets/common/logo.png" alt="玻璃小店 logo"><span>玻璃小店</span></div>
    <section class="hero">
      <h1>商品列表</h1>
      <p class="muted">以下商品頁由 Google Sheet 自動上架流程產生，價格與整箱入數以表單資料為準。</p>
    </section>
    <section class="grid">
      <article class="card">
        <img class="thumb" src="assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖">
        <div class="panel">
          <h2>100四方瓶</h2>
          <div class="price">NT$1,155 <span style="font-size:14px;font-weight:600">/ 箱（105支）</span></div>
          <p class="muted">Google Sheet 自動上架頁</p>
          <p><a class="btn" href="products/100四方瓶.html">看商品頁</a></p>
        </div>
      </article>
      <article class="card">
        <img class="thumb" src="assets/products/100六角瓶/main.jpg" alt="100六角瓶主圖">
        <div class="panel">
          <h2>100六角瓶</h2>
          <div class="price">NT$475 <span style="font-size:14px;font-weight:600">/ 箱（50支）</span></div>
          <p class="muted">Google Sheet 自動上架頁</p>
          <p><a class="btn" href="products/100六角瓶.html">看商品頁</a></p>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
