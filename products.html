<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全部商品｜玻璃小店</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f5f2;color:#222;line-height:1.65}
    :root{--green:#06c755;--dark:#2f251f;--muted:#6b5849;--line:#e7e0d7;--card:#fff;--warm:#6f5b4b}
    .site-header{background:var(--card);border-bottom:2px solid var(--line);position:sticky;top:0;z-index:100}
    .site-header__inner{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:62px}
    .site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--dark);font-size:18px;font-weight:800;flex-shrink:0}
    .site-logo img{width:34px;height:34px;border-radius:8px;display:block}
    .site-nav{display:flex;gap:8px;align-items:center}
    .site-nav a{display:inline-flex;align-items:center;padding:8px 14px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;border:1px solid transparent;transition:all .15s;white-space:nowrap}
    .site-nav a.btn-home{border-color:#d4cdc6;color:var(--dark);background:#fff}
    .site-nav a.btn-home:hover,.site-nav a.active{background:#f6efe8;border-color:#b08e73}
    .site-nav a.btn-line{background:var(--green);color:#fff;border-color:var(--green)}
    .site-nav a.btn-line:hover{background:#05a348}
    .page{max-width:1180px;margin:0 auto;padding:28px 20px 40px}
    .page-title{margin:0 0 8px;font-size:28px;color:var(--dark)}
    .text-muted{color:var(--muted);font-size:14px;margin:0 0 20px}
    .layout{display:flex;gap:24px;align-items:flex-start}
    .sidebar{width:200px;flex-shrink:0}
    .sidebar a{display:block;padding:11px 14px;border:1px solid var(--line);border-radius:10px;text-decoration:none;color:var(--muted);font-weight:700;font-size:14px;margin-bottom:8px;transition:all .15s;background:#fff}
    .sidebar a:hover,.sidebar a.active{border-color:#b08e73;background:#f6efe8;color:var(--dark)}
    .sidebar a.sideline{margin-top:16px;font-size:13px;color:var(--muted);border-color:transparent;background:transparent}
    .main{flex:1}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
    .product-card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s}
    .product-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08)}
    .product-card__img{display:block;width:100%;aspect-ratio:1/1;overflow:hidden;background:#fff}
    .product-card__img img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
    .product-card__img:hover img{transform:scale(1.04)}
    .product-card__body{padding:16px;flex:1;display:flex;flex-direction:column}
    .product-card__name{margin:0 0 8px;font-size:20px;color:var(--dark)}
    .product-card__price{font-size:24px;font-weight:800;color:var(--warm);margin-bottom:4px}
    .product-card__meta{font-size:13px;color:var(--muted);margin-bottom:14px;flex:1}
    .product-card .btn{display:block;width:100%;text-align:center;padding:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--dark);font-weight:700;text-decoration:none;font-size:14px;transition:all .15s}
    .product-card .btn:hover{background:#f6efe8;border-color:#b08e73}
    .site-footer{background:#fff;border-top:1px solid var(--line);padding:22px 20px;text-align:center;color:var(--muted);font-size:13px}
    .site-footer a{color:var(--muted);text-decoration:none}
    .site-footer a:hover{text-decoration:underline}
    @media(max-width:900px){.layout{flex-direction:column}.sidebar{width:100%}.sidebar a{display:inline-block;margin-right:8px;margin-bottom:8px}.product-grid{grid-template-columns:1fr}}
    @media(max-width:600px){.site-header__inner{padding:10px 16px;min-height:52px}.site-logo{font-size:16px;min-width:0}.site-logo img{width:28px;height:28px}.site-logo span{white-space:nowrap}.site-nav{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px}.site-nav a{padding:7px 10px;font-size:13px}}
  </style>
</head>
<body>
<header class="site-header">
  <div class="site-header__inner">
    <a class="site-logo" href="/glassflowlab-site-preview/">
      <img src="/glassflowlab-site-preview/assets/common/logo.png" alt="玻璃小店 logo">
      <span style="text-decoration:none">玻璃小店</span>
    </a>
    <nav class="site-nav">
      <a class="btn-home" href="/glassflowlab-site-preview/">回首頁</a>
      <a class="btn-home active" href="/glassflowlab-site-preview/products.html">全部商品</a>
      <a class="btn-line" href="https://line.me/R/ti/p/@lrg1884b?ts=09121613&oat_content=url">LINE 詢價</a>
    </nav>
  </div>
</header>

<main class="page">
  <div class="layout">
    <aside class="sidebar">
      <a class="active" href="/glassflowlab-site-preview/products.html">全部商品</a>
      <a href="/glassflowlab-site-preview/products.html">寬口瓶</a>
      <a href="/glassflowlab-site-preview/products.html">窄口瓶</a>
      <a href="#">紙盒</a>
      <a href="#">配件</a>
    </aside>
    <div class="main">
      <div class="breadcrumb"><a href="/glassflowlab-site-preview/">首頁</a> / <span>全部商品</span></div>
      <h1 class="page-title">全部商品</h1>
      <p class="text-muted">點圖片或「看商品頁」皆可進入商品詳情。</p>
      <div class="product-grid">
        <article class="product-card">
          <a class="product-card__img" href="/glassflowlab-site-preview/products/100六角瓶.html">
            <img src="/glassflowlab-site-preview/assets/products/100六角瓶/main.jpg" alt="100六角瓶主圖">
          </a>
          <div class="product-card__body">
            <h3 class="product-card__name">100六角瓶</h3>
            <div class="product-card__price">NT$475 <span style="font-size:15px;font-weight:600">/ 箱（50支）</span></div>
            <div class="product-card__meta">寬口瓶</div>
            <a class="btn" href="/glassflowlab-site-preview/products/100六角瓶.html">看商品頁</a>
          </div>
        </article>
        <article class="product-card">
          <a class="product-card__img" href="/glassflowlab-site-preview/products/100四方瓶.html">
            <img src="/glassflowlab-site-preview/assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖">
          </a>
          <div class="product-card__body">
            <h3 class="product-card__name">100四方瓶</h3>
            <div class="product-card__price">NT$1,155 <span style="font-size:15px;font-weight:600">/ 箱（105支）</span></div>
            <div class="product-card__meta">寬口瓶</div>
            <a class="btn" href="/glassflowlab-site-preview/products/100四方瓶.html">看商品頁</a>
          </div>
        </article>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer" style="padding:24px 20px">
  <div style="max-width:1180px;margin:0 auto;text-align:center">
    <div style="font-size:12px;color:#9a8a7c">
      商品價格為自取價，配送運費另計｜週末與國定假日不出貨｜實際庫存與出貨時間以下單前確認為準
    </div>
  </div>
</footer>
</body>
</html>
