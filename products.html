<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全部商品｜玻璃小店</title>
  <style>
    :root{--bg:#f7f5f2;--card:#fff;--text:#222;--muted:#666;--line:#e7e0d7;--brand:#6f5b4b;--linegreen:#06c755}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
    .layout{max-width:1180px;margin:0 auto;padding:20px;display:grid;grid-template-columns:240px 1fr;gap:24px}
    .sidebar,.main,.card{background:#fff;border:1px solid var(--line);border-radius:18px}.sidebar,.main{padding:20px}.brand{display:flex;align-items:center;gap:10px;color:#3f332b;font-weight:800;text-decoration:none;margin-bottom:18px}.brand img{width:34px;height:34px;border-radius:8px}
    .cat-link{display:block;padding:12px 14px;border:1px solid var(--line);border-radius:12px;text-decoration:none;color:#4d4036;background:#fcfbf9;margin-bottom:10px;font-weight:700}
    .cat-link.active{border-color:#b08e73;background:#f6efe8;color:#2f251f}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
    .card{overflow:hidden}.thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#fff;border-bottom:1px solid var(--line)}.panel{padding:18px}.price{font-size:24px;font-weight:800;color:var(--brand)}.muted{color:#6b5849}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:800;background:var(--linegreen);color:#fff}
    @media (max-width:900px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="brand" href="/glassflowlab-site-preview/"><img src="assets/common/logo.png" alt="玻璃小店 logo"><span>玻璃小店</span></a>
      <a class="cat-link active" href="/glassflowlab-site-preview/products.html">全部商品</a>
      <a class="cat-link" href="/glassflowlab-site-preview/category/寬口瓶.html">寬口瓶</a>
    </aside>
    <main class="main">
      <h1 style="margin-top:0">全部商品</h1>
      <p class="muted">可先從左側選分類，再進入商品頁查看完整規格與詢價資訊。</p>
      <div class="grid">
        <article class="card">
          <img class="thumb" src="assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖">
          <div class="panel">
            <h2>100四方瓶</h2>
            <div class="price">NT$1,155 <span style="font-size:14px;font-weight:600">/ 箱（105支）</span></div>
            <p class="muted">分類：寬口瓶</p>
            <p><a class="btn" href="products/100四方瓶.html">看商品頁</a></p>
          </div>
        </article>
        <article class="card">
          <img class="thumb" src="assets/products/100六角瓶/main.jpg" alt="100六角瓶主圖">
          <div class="panel">
            <h2>100六角瓶</h2>
            <div class="price">NT$475 <span style="font-size:14px;font-weight:600">/ 箱（50支）</span></div>
            <p class="muted">分類：寬口瓶</p>
            <p><a class="btn" href="products/100六角瓶.html">看商品頁</a></p>
          </div>
        </article>
      </div>
    </main>
  </div>
</body>
</html>
