<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>100四方瓶｜玻璃小店</title>
  <style>
    :root{--bg:#f7f5f2;--card:#fff;--text:#222;--muted:#666;--line:#e7e0d7;--brand:#6f5b4b;--linegreen:#06c755}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
    .wrap{max-width:960px;margin:0 auto;padding:20px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:20px}
    .heroimg{width:100%;max-width:420px;aspect-ratio:1/1;object-fit:cover;border-radius:16px;border:1px solid var(--line);background:#fff}
    .grid{display:grid;grid-template-columns:420px 1fr;gap:24px}.price{font-size:32px;font-weight:800;color:var(--brand)}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:12px;text-decoration:none;font-weight:800;background:var(--linegreen);color:#fff}
    table{width:100%;border-collapse:collapse}th,td{padding:12px 0;border-bottom:1px solid var(--line);text-align:left}th{width:160px;color:#6b5849}
    .muted{color:#6b5849}.pill{display:inline-block;padding:6px 10px;background:#f1ebe4;border-radius:999px;color:#6f5b4b;font-size:12px;font-weight:700}
    @media (max-width: 900px){.grid{grid-template-columns:1fr}.heroimg{max-width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="grid">
        <div><img class="heroimg" src="../assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖"></div>
        <div>
          <div class="pill">Google Sheet 自動上架</div>
          <h1>100四方瓶</h1>
          <div class="price">NT$1,155 <span style="font-size:16px;font-weight:600">/ 箱（105支）</span></div>
          <p class="muted">自取價，配送另計運費。平均約 NT$11.00 / 支</p>
          <p><a class="btn" href="https://line.me/R/ti/p/@lrg1884b?ts=09121613&oat_content=url">LINE 詢價</a></p>
        </div>
      </div>
    </section>
    <section class="card">
      <h2>商品規格</h2>
      <table>
        <tr><th>商品名稱</th><td>100四方瓶</td></tr>
        <tr><th>貨號</th><td>CP-11 COSPAK 15513I</td></tr>
        <tr><th>內容量</th><td>100 cc</td></tr>
        <tr><th>全滿容量</th><td>120 cc</td></tr>
        <tr><th>尺寸</th><td>5.3 × 5.3 × 7.4 cm</td></tr>
        <tr><th>重量</th><td>128 g / 支</td></tr>
        <tr><th>瓶蓋尺寸</th><td>48</td></tr>
        <tr><th>箱入數</th><td>105 支 / 箱</td></tr>
        <tr><th>售價</th><td>NT$1,155 / 箱</td></tr>
        <tr><th>資料來源</th><td>Google Sheet（價格 / 箱入數）</td></tr>
      </table>
    </section>
  </div>
</body>
</html>
