<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>玻璃小店｜商品分類入口</title>
  <style>
    :root{--bg:#f7f5f2;--card:#fff;--text:#222;--muted:#666;--line:#e7e0d7;--brand:#6f5b4b;--linegreen:#06c755}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
    .wrap{max-width:1080px;margin:0 auto;padding:20px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;color:#3f332b;font-weight:800;text-decoration:none;font-size:18px}.brand img{width:34px;height:34px;border-radius:8px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:12px;text-decoration:none;font-weight:700;border:1px solid transparent}.btn.line{background:var(--linegreen);color:#fff}.btn.ghost{background:#fff;border-color:var(--line);color:#4d4036}
    .hero{padding:28px;background:#fff;border:1px solid var(--line);border-radius:20px;margin-bottom:28px}
    h1{margin:0 0 10px;font-size:34px;color:#2f251f}
    .muted{color:#6b5849;font-size:15px}
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:32px}
    .cat-card{display:block;padding:22px;background:#fff;border:2px solid var(--line);border-radius:16px;text-decoration:none;color:var(--text);transition:border-color .15s,box-shadow .15s}
    .cat-card:hover{border-color:#b08e73;box-shadow:0 4px 16px rgba(0,0,0,.06)}
    .cat-card strong{display:block;font-size:20px;margin-bottom:6px;color:#2f251f}
    .cat-card span{font-size:13px;color:#6b5849}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .product-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}
    .product-card .thumb-wrap{display:block;width:100%;aspect-ratio:1/1;overflow:hidden;background:#fff}
    .product-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
    .product-card .thumb-wrap:hover img{transform:scale(1.03)}
    .product-card .panel{padding:16px;flex:1;display:flex;flex-direction:column}
    .product-card h3{margin:0 0 8px;font-size:20px;color:#2f251f}
    .product-card .price{font-size:24px;font-weight:800;color:var(--brand);margin-bottom:4px}
    .product-card .price-sub{font-size:13px;color:#6b5849;margin-bottom:12px}
    .product-card .btn{margin-top:auto;width:100%;text-align:center}
    .footer{padding:24px 0;text-align:center;color:#7a695d;font-size:13px;border-top:1px solid var(--line);margin-top:32px}
    @media(max-width:600px){h1{font-size:26px}.topbar{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="/glassflowlab-site-preview/">
        <img src="assets/common/logo.png" alt="玻璃小店 logo">
        <span>玻璃小店</span>
      </a>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn ghost" href="products.html">全部商品</a>
        <a class="btn ghost" href="category/寬口瓶.html">寬口瓶</a>
        <a class="btn line" href="https://line.me/R/ti/p/@lrg1884b?ts=09121613&oat_content=url">LINE 詢價</a>
      </div>
    </div>

    <div class="hero">
      <h1>商品分類</h1>
      <p class="muted">選擇分類，查看商品。頁面標示價格為自取價，配送運費另計。</p>
    </div>

    <div class="cat-grid">
      <a class="cat-card" href="category/寬口瓶.html">
        <strong>寬口瓶</strong>
        <span>查看分類 →</span>
      </a>
    </div>

    <h2 style="margin:0 0 16px;font-size:22px;color:#342922">目前可查看商品</h2>
    <div class="product-grid">
      <article class="product-card">
        <a class="thumb-wrap" href="products/100六角瓶.html">
          <img src="assets/products/100六角瓶/main.jpg" alt="100六角瓶主圖">
        </a>
        <div class="panel">
          <h3>100六角瓶</h3>
          <div class="price">NT$475 <span style="font-size:16px;font-weight:600">/ 箱</span></div>
          <div class="price-sub">50支・寬口瓶</div>
          <a class="btn ghost" href="products/100六角瓶.html">看商品頁</a>
        </div>
      </article>

      <article class="product-card">
        <a class="thumb-wrap" href="products/100四方瓶.html">
          <img src="assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖">
        </a>
        <div class="panel">
          <h3>100四方瓶</h3>
          <div class="price">NT$1,155 <span style="font-size:16px;font-weight:600">/ 箱</span></div>
          <div class="price-sub">105支・寬口瓶</div>
          <a class="btn ghost" href="products/100四方瓶.html">看商品頁</a>
        </div>
      </article>
    </div>

    <div class="footer">
      <a href="/" style="color:#7a695d;text-decoration:none">玻璃小店</a>｜商品價格為自取價，配送運費另計，實際庫存與出貨時間以下單前確認為準。
    </div>
  </div>
</body>
</html>
