<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>玻璃小店｜商品分類入口</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f5f2;color:#222;line-height:1.65}
    :root{--green:#06c755;--dark:#2f251f;--muted:#6b5849;--line:#e7e0d7;--card:#fff;--warm:#6f5b4b}

    /* ===== SHARED HEADER ===== */
    .site-header{background:var(--card);border-bottom:2px solid var(--line);position:sticky;top:0;z-index:100}
    .site-header__inner{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:62px;flex-wrap:wrap}
    .site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--dark);font-size:18px;font-weight:800;flex-shrink:0}
    .site-logo img{width:34px;height:34px;border-radius:8px;display:block}
    .site-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .site-nav a{display:inline-flex;align-items:center;padding:8px 14px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;border:1px solid transparent;transition:all .15s}
    .site-nav a.btn-home{border-color:#d4cdc6;color:var(--dark);background:#fff}
    .site-nav a.btn-home:hover{background:#f6efe8;border-color:#b08e73}
    .site-nav a.btn-line{background:var(--green);color:#fff;border-color:var(--green)}
    .site-nav a.btn-line:hover{background:#05a348}

    /* ===== PAGE CONTENT ===== */
    .page{max-width:1180px;margin:0 auto;padding:28px 20px 40px}
    .hero-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px 32px;margin-bottom:28px}
    .hero-card h1{margin:0 0 10px;font-size:34px;color:var(--dark);line-height:1.2}
    .text-muted{color:var(--muted);font-size:15px;margin:0}
    .section-title{font-size:22px;color:var(--dark);margin:0 0 16px;font-weight:800}

    /* category cards */
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:32px}
    a.cat-card{display:block;padding:22px;background:#fff;border:2px solid var(--line);border-radius:16px;text-decoration:none;color:var(--dark);transition:all .15s}
    a.cat-card:hover{border-color:#b08e73;box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-1px)}
    a.cat-card strong{display:block;font-size:20px;margin-bottom:6px;color:var(--dark)}
    a.cat-card span{font-size:13px;color:var(--muted)}

    /* product grid */
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .product-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s}
    .product-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08)}
    .product-card__img{display:block;width:100%;aspect-ratio:1/1;overflow:hidden;background:#fff}
    .product-card__img img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
    .product-card__img:hover img{transform:scale(1.04)}
    .product-card__body{padding:16px;flex:1;display:flex;flex-direction:column}
    .product-card__name{margin:0 0 8px;font-size:20px;color:var(--dark)}
    .product-card__price{font-size:24px;font-weight:800;color:var(--warm);margin-bottom:4px}
    .product-card__meta{font-size:13px;color:var(--muted);margin-bottom:14px;flex:1}
    .product-card .btn{display:block;width:100%;text-align:center;padding:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--dark);font-weight:700;text-decoration:none;font-size:14px;transition:all .15s}
    .product-card .btn:hover{background:#f6efe8;border-color:#b08e73}

    /* ===== SHARED FOOTER ===== */
    .site-footer{background:#fff;border-top:1px solid var(--line);padding:22px 20px;text-align:center;color:var(--muted);font-size:13px}
    .site-footer a{color:var(--muted);text-decoration:none}
    .site-footer a:hover{text-decoration:underline}

    @media(max-width:600px){
      h1{font-size:26px}.page{padding:16px}.site-header__inner{height:auto;padding:12px 16px}.product-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-header__inner">
    <a class="site-logo" href="/glassflowlab-site-preview/">
      <img src="assets/common/logo.png" alt="玻璃小店 logo">
      <span>玻璃小店</span>
    </a>
    <nav class="site-nav">
      <a class="btn-home" href="/glassflowlab-site-preview/">回首頁</a>
      <a class="btn-home" href="/glassflowlab-site-preview/products.html">全部商品</a>
      <a class="btn-home" href="/glassflowlab-site-preview/category/寬口瓶.html">寬口瓶</a>
      <a class="btn-line" href="https://line.me/R/ti/p/@lrg1884b?ts=09121613&oat_content=url">LINE 詢價</a>
    </nav>
  </div>
</header>

<!-- CONTENT -->
<main class="page">
  <div class="hero-card">
    <h1>商品分類</h1>
    <p class="text-muted">選擇分類，查看商品。頁面標示價格為自取價，配送運費另計。</p>
  </div>

  <h2 class="section-title">產品分類</h2>
  <div class="cat-grid">
    <a class="cat-card" href="category/寬口瓶.html">
      <strong>寬口瓶</strong>
      <span>查看分類 →</span>
    </a>
  </div>

  <h2 class="section-title">目前可查看商品</h2>
  <div class="product-grid">
    <article class="product-card">
      <a class="product-card__img" href="products/100六角瓶.html">
        <img src="assets/products/100六角瓶/main.jpg" alt="100六角瓶主圖">
      </a>
      <div class="product-card__body">
        <h3 class="product-card__name">100六角瓶</h3>
        <div class="product-card__price">NT$475 <span style="font-size:15px;font-weight:600">/ 箱</span></div>
        <div class="product-card__meta">50支・寬口瓶</div>
        <a class="btn" href="products/100六角瓶.html">看商品頁</a>
      </div>
    </article>
    <article class="product-card">
      <a class="product-card__img" href="products/100四方瓶.html">
        <img src="assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖">
      </a>
      <div class="product-card__body">
        <h3 class="product-card__name">100四方瓶</h3>
        <div class="product-card__price">NT$1,155 <span style="font-size:15px;font-weight:600">/ 箱</span></div>
        <div class="product-card__meta">105支・寬口瓶</div>
        <a class="btn" href="products/100四方瓶.html">看商品頁</a>
      </div>
    </article>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <a href="/glassflowlab-site-preview/">玻璃小店</a>｜商品價格為自取價，配送運費另計，實際庫存與出貨時間以下單前確認為準。
</footer>

</body>
</html>
