<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>玻璃小店｜商品分類入口</title>
  <style>
    :root{--bg:#f7f5f2;--card:#fff;--text:#222;--muted:#666;--line:#e7e0d7;--brand:#6f5b4b;--linegreen:#06c755}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
    .wrap{max-width:1080px;margin:0 auto;padding:20px}.header{padding:16px 0 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;color:#3f332b;font-weight:800;text-decoration:none}.brand img{width:34px;height:34px;border-radius:8px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:12px;text-decoration:none;font-weight:800;border:1px solid transparent}.btn.line{background:var(--linegreen);color:#fff}.btn.ghost{background:#fff;border-color:var(--line);color:#4d4036}
    .card,.hero,.cat-card,.product-card{background:#fff;border:1px solid var(--line);border-radius:18px}.hero{padding:28px;margin-bottom:24px}.cat-grid,.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}.cat-card,.product-card{padding:18px}.product-card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;border:1px solid var(--line);margin-bottom:12px}.price{font-size:24px;font-weight:800;color:var(--brand)}.muted{color:#6b5849}.section{margin-top:24px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <a class="brand" href="/glassflowlab-site-preview/"><img src="assets/common/logo.png" alt="玻璃小店 logo"><span>玻璃小店</span></a>
      <div style="display:flex;gap:12px;flex-wrap:wrap"><a class="btn ghost" href="products.html">全部商品</a><a class="btn line" href="https://line.me/R/ti/p/@lrg1884b?ts=09121613&oat_content=url">LINE 詢價</a></div>
    </div>
    <section class="hero"><h1 style="margin:0 0 12px">商品分類</h1><p class="muted" style="margin:0">先選分類，再看商品。後續商品與配件會依 Google Sheet 的產品分類持續擴充。</p></section>
    <section class="section"><h2>產品分類</h2><div class="cat-grid"><a class="cat-card" href="category/寬口瓶.html" style="text-decoration:none;color:#222"><strong style="display:block;font-size:22px;margin-bottom:8px">寬口瓶</strong><span class="muted">目前 2 項商品</span></a></div></section>
    <section class="section"><h2>目前可查看商品</h2><div class="product-grid"><article class="product-card"><img src="assets/products/100四方瓶/main.jpg" alt="100四方瓶主圖"><h3 style="margin:0 0 8px">100四方瓶</h3><div class="price">NT$1,155</div><div class="muted">/ 箱（105支）・寬口瓶</div><p><a class="btn ghost" href="products/100四方瓶.html">看商品頁</a></p></article><article class="product-card"><img src="assets/products/100六角瓶/main.jpg" alt="100六角瓶主圖"><h3 style="margin:0 0 8px">100六角瓶</h3><div class="price">NT$475</div><div class="muted">/ 箱（50支）・寬口瓶</div><p><a class="btn ghost" href="products/100六角瓶.html">看商品頁</a></p></article></div></section>
  </div>
</body>
</html>
